<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/todo.css">
    <title>My Todos</title>
</head>

<body>
    <!--Navigation bar-->
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Todo App</a>

            <div class="ms-auto d-flex align-items-center">
                <span class="fw-semibold me-3" id="username">Hello, User</span>
                <a href="login.html" class="btn btn-danger" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <!--Main-->
    <section class="todo-section py-5">
        <div class="container">
            <div class="card shadow rounded-4">
                <div class="card-body">

                    <h2 class="text-center mb-4">My Todos</h2>

                    <form class="row g-3 mb-4" id="todoForm">

                        <div class="col-md-9">
                            <input
                                id="todoInput"
                                type="text"
                                class="form-control"
                                placeholder="Enter a new task">
                        </div>

                        <div class="col-md-3 d-grid">
                            <button type="submit" class="btn btn-success" id="addTodoBtn">
                                Add Task
                            </button>
                        </div>

                    </form>
                    
                    <!--Error Alert-->
                    <div id="todoError" class="alert alert-danger d-none mb-3"></div>


                    <!--Main Table-->
                    <table class="table table-hover align-middle">

                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Task</th>
                                <th>Status</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="todoTable"></tbody>
                    </table>

                    <!--Empty State-->
                    <div id="emptyState" class="text-center py-5">

                        <h4>No tasks yet.</h4>

                        <p>Create your first task.</p>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <!--Footer-->
    <footer>
        <div class="text-center py-4 bg-dark text-white">
            <p class="mb-0">
                © 2026 Todo App. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/todos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
