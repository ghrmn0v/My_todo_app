<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/todo.css">
    <title>My Todos</title>
</head>

<body>
    <!--Navigation bar-->
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Todo App</a>

            <div class="ms-auto d-flex align-items-center">
                <span class="fw-semibold me-3">Hello, User</span>
                <a href="login.html" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <!--Main-->
    <section class="todo-section py-5">
        <div class="container">

            <div class="card shadow rounded-4">
                <div class="card-body">

                    <h2 class="text-center mb-4">My Todos</h2>

                    <form class="row g-3 mb-4">

                        <div class="col-md-9">
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter a new task">
                        </div>

                        <div class="col-md-3 d-grid">
                            <button class="btn btn-success">
                                Add Task
                            </button>
                        </div>

                    </form>

                    <table class="table table-hover align-middle">

                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Task</th>
                                <th>Status</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr>
                                <td>1</td>
                                <td>Learn Bootstrap</td>

                                <td>
                                    <span class="badge bg-warning text-dark">
                                        Pending
                                    </span>
                                </td>

                                <td class="text-end">
                                    <button class="btn btn-success btn-sm">
                                        Complete
                                    </button>

                                    <button class="btn btn-danger btn-sm">
                                        Delete
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>2</td>
                                <td>Finish Todo Project</td>

                                <td>
                                    <span class="badge bg-success">
                                        Completed
                                    </span>
                                </td>

                                <td class="text-end">
                                    <button class="btn btn-danger btn-sm">
                                        Delete
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>3</td>
                                <td>Go to Gym</td>

                                <td>
                                    <span class="badge bg-warning text-dark">
                                        Pending
                                    </span>
                                </td>

                                <td class="text-end">
                                    <button class="btn btn-success btn-sm">
                                        Complete
                                    </button>

                                    <button class="btn btn-danger btn-sm">
                                        Delete
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!--Footer-->
    <footer>
        <div class="text-center py-4 bg-dark text-white">
            <p class="mb-0">
                © 2026 Todo App. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
